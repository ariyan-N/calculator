<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecretCalc Pro+</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.calculator{
width:340px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
}

.display{
height:80px;
background:rgba(0,0,0,0.6);
border-radius:18px;
padding:20px;
font-size:28px;
color:#00ffcc;
text-align:right;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:flex-end;
overflow:hidden;
transition:0.2s;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

button{
height:55px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
transition:0.25s;
background:rgba(255,255,255,0.07);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

button:hover{transform:translateY(-3px);background:rgba(255,255,255,0.15);}

.operator{color:#00ffc3;}
.equal{background:#00ffc3;color:black;font-weight:600;}
.equal:hover{background:#00d9a6;}
.clear{color:#ff4d4d;}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.75);
}

.modal-content{
width:320px;
background:#1c1c1c;
padding:25px;
border-radius:20px;
color:white;
animation:fadeIn 0.3s ease;
}

.modal-content h3{margin-bottom:15px;}
.modal-content input, .modal-content select{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:15px;
background:#2a2a2a;
color:white;
}

.modal-content button{width:100%;margin-bottom:10px;}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="calculator">
<div class="display" id="display">0</div>

<div class="buttons">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="press('+')">+</button>
</div>
</div>

<div class="modal" id="settingsModal">
<div class="modal-content">
<h3>Secret Settings</h3>

<input type="password" id="pinInput" placeholder="Set/Enter PIN (optional)">
<input type="text" id="customTextInput" placeholder="Custom Secret Text">
<input type="color" id="textColorPicker" value="#00ffcc">

<label>Font Size</label>
<input type="range" id="fontSizeSlider" min="18" max="40" value="28">

<label>Loading Delay (ms)</label>
<input type="number" id="delayInput" value="800">

<label>
<input type="checkbox" id="secretToggle">
Enable Secret Mode
</label>

<button class="equal" onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>
</div>
</div>

<script>
let expression="";
let isSecretMode=false;
let customText="";
let textColor="#00ffcc";
let fontSize=28;
let delayTime=800;
let savedPin="";

loadSettings();

function press(value){
expression+=value;
updateDisplay(expression);
}

function clearDisplay(){
expression="";
updateDisplay("0");
}

function calculate(){

if(expression==="0+0"){
openSettings();
expression="";
return;
}

if(isSecretMode){
showLoading(()=>{
updateDisplay(customText || "Secret Mode");
});
expression="";
return;
}

try{
let result=eval(expression);
updateDisplay(result);
expression=result.toString();
}catch{
updateDisplay("Error");
expression="";
}
}

function updateDisplay(value){
let display=document.getElementById("display");
display.innerText=value;
display.style.color=textColor;
display.style.fontSize=fontSize+"px";
autoResize(display);
}

function autoResize(display){
if(display.innerText.length>15){
display.style.fontSize="18px";
}
}

function showLoading(callback){
updateDisplay("Calculating...");
setTimeout(callback,delayTime);
}

function openSettings(){
let pin=document.getElementById("pinInput").value;
if(savedPin && pin!==savedPin){
alert("Wrong PIN");
return;
}
document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
document.getElementById("settingsModal").style.display="none";
}

function saveSettings(){
customText=document.getElementById("customTextInput").value;
isSecretMode=document.getElementById("secretToggle").checked;
textColor=document.getElementById("textColorPicker").value;
fontSize=document.getElementById("fontSizeSlider").value;
delayTime=document.getElementById("delayInput").value;
savedPin=document.getElementById("pinInput").value;

localStorage.setItem("secretData",JSON.stringify({
customText,isSecretMode,textColor,fontSize,delayTime,savedPin
}));

closeSettings();
}

function loadSettings(){
let data=localStorage.getItem("secretData");
if(data){
let parsed=JSON.parse(data);
customText=parsed.customText;
isSecretMode=parsed.isSecretMode;
textColor=parsed.textColor;
fontSize=parsed.fontSize;
delayTime=parsed.delayTime;
savedPin=parsed.savedPin;
}
}

window.addEventListener("beforeunload",()=>{
isSecretMode=false;
});
</script>

</body>
</html>
